name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build Lambdas (arm64)
        run: |
          for d in interaction worker scheduler; do
            GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/$d ./cmd/$d
          done
